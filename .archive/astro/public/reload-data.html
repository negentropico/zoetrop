<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reload Seed Data</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 20px;
    }
    .status {
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .info { background: #e0f2fe; color: #0369a1; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .stats { background: #f3f4f6; padding: 15px; border-radius: 8px; margin: 20px 0; }
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #1d4ed8; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    pre { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Data Debug & Reload</h1>

  <div id="currentData" class="stats">
    <h3>Current localStorage Data</h3>
    <div id="currentStats">Loading...</div>
  </div>

  <div>
    <button onclick="reloadData()">Reload Fresh Seed Data</button>
    <button onclick="clearData()" class="danger">Clear All Data</button>
    <button onclick="window.location.href='/'">Go to Dashboard</button>
  </div>

  <div id="status" class="status info" style="display: none;"></div>

  <div id="details" class="stats" style="display: none;">
    <h3>Loaded Data Summary</h3>
    <div id="loadedStats"></div>
  </div>

  <script>
    function showCurrentData() {
      const statsDiv = document.getElementById('currentStats');
      try {
        const stored = localStorage.getItem('wellness_tracker_metrics');
        if (!stored) {
          statsDiv.innerHTML = '<p style="color: #dc2626;">No data in localStorage!</p>';
          return;
        }

        const data = JSON.parse(stored);
        const metrics = data.metrics || [];

        // Count by category
        const cats = {};
        metrics.forEach(m => {
          cats[m.category] = (cats[m.category] || 0) + 1;
        });

        let html = '<ul style="margin: 0; padding-left: 20px;">';
        Object.entries(cats)
          .sort((a, b) => b[1] - a[1])
          .forEach(([cat, count]) => {
            html += '<li><strong>' + cat + '</strong>: ' + count.toLocaleString() + '</li>';
          });
        html += '</ul>';
        html += '<p><strong>Total metrics:</strong> ' + metrics.length.toLocaleString() + '</p>';
        html += '<p><strong>Last updated:</strong> ' + (data.lastUpdated || 'unknown') + '</p>';
        statsDiv.innerHTML = html;
      } catch (e) {
        statsDiv.innerHTML = '<p style="color: #dc2626;">Error reading data: ' + e.message + '</p>';
      }
    }

    async function reloadData() {
      const status = document.getElementById('status');
      const details = document.getElementById('details');
      const loadedStats = document.getElementById('loadedStats');

      status.style.display = 'block';
      status.className = 'status info';
      status.textContent = 'Fetching fresh seed data...';

      try {
        // Clear existing data first
        localStorage.removeItem('wellness_tracker_metrics');

        // Fetch seed data
        const response = await fetch('/.dev/seed-data.json');
        if (!response.ok) throw new Error('Failed to fetch: ' + response.status);

        const seedData = await response.json();

        status.textContent = 'Processing ' + seedData.metrics.length.toLocaleString() + ' metrics...';

        // Store in localStorage
        const storageData = {
          metrics: seedData.metrics,
          lastUpdated: new Date().toISOString(),
          syncVersion: 1
        };
        localStorage.setItem('wellness_tracker_metrics', JSON.stringify(storageData));

        // Show success
        status.className = 'status success';
        status.textContent = 'Successfully loaded ' + seedData.metrics.length.toLocaleString() + ' metrics!';

        // Show details
        details.style.display = 'block';
        const cats = {};
        seedData.metrics.forEach(m => {
          cats[m.category] = (cats[m.category] || 0) + 1;
        });

        let html = '<ul style="margin: 0; padding-left: 20px;">';
        Object.entries(cats)
          .sort((a, b) => b[1] - a[1])
          .forEach(([cat, count]) => {
            html += '<li><strong>' + cat + '</strong>: ' + count.toLocaleString() + '</li>';
          });
        html += '</ul>';
        loadedStats.innerHTML = html;

        // Refresh current data display
        showCurrentData();

      } catch (e) {
        status.className = 'status error';
        status.textContent = 'Error: ' + e.message;
      }
    }

    function clearData() {
      if (confirm('This will delete ALL stored metrics. Are you sure?')) {
        localStorage.removeItem('wellness_tracker_metrics');
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').className = 'status info';
        document.getElementById('status').textContent = 'All data cleared.';
        showCurrentData();
      }
    }

    // Show current data on load
    showCurrentData();
  </script>
</body>
</html>
