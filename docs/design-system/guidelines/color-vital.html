<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:20px;font-family:var(--font-mono)}
  .ramp{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .step{height:74px;display:flex;align-items:flex-end;padding:6px;font-size:9px;letter-spacing:.03em}
</style></head><body>
<div class="ramp">
  <div class="step" style="background:var(--vital-50)">50</div>
  <div class="step" style="background:var(--vital-100)">100</div>
  <div class="step" style="background:var(--vital-200)">200</div>
  <div class="step" style="background:var(--vital-300);color:#fff">300</div>
  <div class="step" style="background:var(--vital-400);color:#fff">400</div>
  <div class="step" style="background:var(--vital-500);color:#fff">500</div>
  <div class="step" style="background:var(--vital-600);color:#fff">600</div>
</div>
</body></html>
