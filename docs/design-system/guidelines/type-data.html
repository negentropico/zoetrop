<!-- @dsCard group="Type" viewport="700x150" name="Data — Space Mono" subtitle="Metrics, eyebrows, timestamps, tabular numerals" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--ink);padding:24px;font-family:var(--font-mono);color:var(--n-50)}
  .eye{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--energy)}
  .grid{display:flex;gap:40px;margin-top:14px;align-items:baseline}
  .val{font-family:var(--font-display);font-size:42px;font-weight:500;font-variant-numeric:tabular-nums;color:#fff;line-height:1}
  .unit{font-size:13px;color:var(--n-400);margin-left:4px}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--n-400);margin-top:6px}
  .cell{display:flex;flex-direction:column}
</style></head><body>
<div class="eye">Today · 09:41</div>
<div class="grid">
  <div class="cell"><div class="val">6,418<span class="unit">steps</span></div><div class="lbl">Energy</div></div>
  <div class="cell"><div class="val">72<span class="unit">bpm</span></div><div class="lbl">Vital</div></div>
  <div class="cell"><div class="val">7:42<span class="unit">hrs</span></div><div class="lbl">Focus</div></div>
</div>
</body></html>
