<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation / shadows" subtitle="Soft, warm, ink-tinted — light from above" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:30px 24px;font-family:var(--font-mono)}
  .row{display:flex;gap:26px;align-items:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:78px;height:78px;background:var(--surface);border-radius:var(--radius-md)}
  .t{font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t">xs</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="t">xl</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-ring)"></div><div class="t">ring</div></div>
</div>
</body></html>
