<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="Dark, wordmark + tagline" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;background:#cfc9c7;font-family:var(--font-display)}
  .slide{width:1280px;height:720px;flex:none;position:relative;overflow:hidden;background:var(--ink);color:var(--n-50)}
  .grain{position:absolute;inset:0;background-image:radial-gradient(rgba(245,242,240,0.10) 1.4px,transparent 1.4px);background-size:22px 22px;opacity:.5}
  .pad{position:absolute;inset:0;padding:76px 84px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;justify-content:space-between}
  .wm{display:flex;align-items:center;gap:14px;font-size:26px;font-weight:500;letter-spacing:-.02em}
  .wm img{width:36px;height:36px}
  .wm .dot{color:var(--energy)}
  .meta{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--n-400)}
  h1{font-size:138px;font-weight:500;letter-spacing:-.04em;line-height:.92;margin:0}
  h1 em{font-style:normal;color:var(--energy)}
  .sub{font-family:var(--font-text);font-size:22px;color:var(--n-300);max-width:560px;margin-top:26px;line-height:1.4}
  .corner{position:absolute;right:84px;bottom:76px;width:120px;height:120px;opacity:.9}
</style></head><body>
<div class="slide">
  <div class="grain"></div>
  <div class="pad">
    <div class="top">
      <div class="wm"><img src="../assets/mark-spiral-light.svg"><span>zoetrop<span class="dot">.</span></span></div>
      <div class="meta">Wellness, in motion</div>
    </div>
    <div>
      <h1>Every frame<br>of <em>you.</em></h1>
      <div class="sub">Zoetrop turns your daily signals — movement, heart, sleep — into a moving picture of how you feel over time.</div>
    </div>
    <div class="meta">2026 · Brand &amp; Product Overview</div>
  </div>
  <img class="corner" src="../assets/mark-spiral-focus.svg">
</div>
</body></html>
