<!-- @dsCard group="Slides" viewport="1280x720" name="Comparison slide" subtitle="Two-up, frames pattern, teal" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;background:#cfc9c7;font-family:var(--font-display)}
  .slide{width:1280px;height:720px;flex:none;position:relative;overflow:hidden;background:var(--vital);color:var(--ink)}
  .pad{position:absolute;inset:0;padding:72px 84px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:46px}
  .wm{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:500;letter-spacing:-.02em}
  .wm img{width:30px;height:30px}
  .eye{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:rgba(39,35,36,.6)}
  h2{font-size:54px;font-weight:500;letter-spacing:-.03em;line-height:1;margin:0 0 44px;max-width:780px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:28px;flex:1}
  .col{background:var(--paper);border-radius:24px;padding:34px 36px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
  .col.dark{background:var(--ink);color:var(--n-50)}
  .ctag{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
  .col.dark .ctag{color:var(--n-400)}
  .cnum{font-size:96px;font-weight:500;letter-spacing:-.04em;line-height:.9;font-variant-numeric:tabular-nums;margin-top:8px}
  .cdesc{font-family:var(--font-text);font-size:17px;line-height:1.4;color:var(--text-secondary);margin-top:14px}
  .col.dark .cdesc{color:var(--n-300)}
  .col.dark .cnum{color:var(--energy)}
  .frames{position:absolute;right:24px;bottom:20px;width:120px;opacity:.14}
</style></head><body>
<div class="slide">
  <div class="pad">
    <div class="top">
      <div class="wm"><img src="../assets/mark-spiral.svg"><span>zoetrop.</span></div>
      <div class="eye">Before / after · 90 days</div>
    </div>
    <h2>The same person, a clearer picture.</h2>
    <div class="cols">
      <div class="col">
        <div><div class="ctag">Day 1 · resting heart rate</div><div class="cnum" style="color:var(--n-500)">68</div><div class="cdesc">Scattered signals, no rhythm. Hard to tell a good week from a bad one.</div></div>
        <img class="frames" src="../assets/pattern-spiral-dots.svg">
      </div>
      <div class="col dark">
        <div><div class="ctag">Day 90 · resting heart rate</div><div class="cnum">57</div><div class="cdesc">A steady downward trend you can see — and keep.</div></div>
        <img class="frames" src="../assets/pattern-spiral-dots.svg" style="filter:brightness(0) invert(1)">
      </div>
    </div>
  </div>
</div>
</body></html>
