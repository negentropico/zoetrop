<!-- @dsCard group="Slides" viewport="1280x720" name="Quote slide" subtitle="Large display quote on paper" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;height:100%}
  body{display:flex;align-items:center;justify-content:center;background:#cfc9c7;font-family:var(--font-display)}
  .slide{width:1280px;height:720px;flex:none;position:relative;overflow:hidden;background:var(--paper)}
  .grain{position:absolute;inset:0;background-image:radial-gradient(rgba(39,35,36,0.05) 1.2px,transparent 1.2px);background-size:20px 20px}
  .pad{position:absolute;inset:0;padding:80px 96px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;justify-content:space-between}
  .wm{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:500;letter-spacing:-.02em;color:var(--ink)}
  .wm img{width:30px;height:30px}
  .wm .dot{color:var(--focus)}
  .eye{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
  blockquote{margin:0;font-size:62px;font-weight:500;letter-spacing:-.025em;line-height:1.08;color:var(--ink);max-width:1000px}
  blockquote .hl{color:var(--vital);}
  .by{display:flex;align-items:center;gap:16px;margin-top:36px}
  .av{width:56px;height:56px;border-radius:50%;background:var(--ink);color:var(--n-50);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500}
  .name{font-family:var(--font-text);font-size:18px;font-weight:600;color:var(--text)}
  .role{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
  .mark{width:64px;height:64px}
</style></head><body>
<div class="slide">
  <div class="grain"></div>
  <div class="pad">
    <div class="top">
      <div class="wm"><img src="../assets/mark-spiral.svg"><span>zoetrop<span class="dot">.</span></span></div>
      <img class="mark" src="../assets/mark-spiral-focus.svg">
    </div>
    <div>
      <blockquote>“I finally <span class="hl">see the pattern.</span> Small days add up to a year I'm proud of.”</blockquote>
      <div class="by">
        <div class="av">MO</div>
        <div>
          <div class="name">Maya Okafor</div>
          <div class="role">Zoetrop member · 14 months</div>
        </div>
      </div>
    </div>
    <div class="eye">Member story</div>
  </div>
</div>
</body></html>
