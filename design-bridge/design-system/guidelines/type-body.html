<!-- @dsCard group="Type" viewport="700x190" name="Body — Hanken Grotesk" subtitle="UI text, paragraphs, labels" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:24px;font-family:var(--font-text);color:var(--text)}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:12px}
  p{margin:0 0 8px;max-width:560px;line-height:var(--leading-normal)}
  .lead{font-size:var(--text-md);color:var(--text)}
  .base{font-size:var(--text-base);color:var(--text-secondary)}
  .sm{font-size:var(--text-sm);color:var(--text-muted)}
  .weights{display:flex;gap:18px;margin-top:6px;font-size:18px}
  .weights span{color:var(--text-secondary)}
</style></head><body>
<div class="meta">Hanken Grotesk · 300–800</div>
<p class="lead">Your week, one frame at a time.</p>
<p class="base">Zoetrop stitches small daily signals — steps, heart rate, sleep — into a moving picture of how you actually feel over time.</p>
<p class="sm">Synced 2 minutes ago · 6,418 steps · 72 bpm resting</p>
<div class="weights"><span style="font-weight:300">Light</span><span style="font-weight:400">Regular</span><span style="font-weight:500">Medium</span><span style="font-weight:700">Bold</span></div>
</body></html>
