<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="xs 4 → 2xl 36 → pill" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:24px;font-family:var(--font-mono)}
  .row{display:flex;gap:16px;align-items:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:62px;height:62px;background:var(--surface);border:1.5px solid var(--ink)}
  .t{font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="t">xs · 4</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="t">sm · 8</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><div class="t">md · 14</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="t">lg · 20</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="t">xl · 28</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="t">2xl · 36</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="t">pill</div></div>
</div>
</body></html>
