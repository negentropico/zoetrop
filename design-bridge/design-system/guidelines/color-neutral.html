<!-- @dsCard group="Colors" viewport="700x130" name="Warm neutral ramp" subtitle="Paper → Ink, warm-tinted (never blue-grey)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:20px;font-family:var(--font-mono)}
  .ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .step{height:80px;display:flex;align-items:flex-end;padding:5px;font-size:8px;letter-spacing:.02em}
</style></head><body>
<div class="ramp">
  <div class="step" style="background:var(--n-0)">0</div>
  <div class="step" style="background:var(--n-50)">50</div>
  <div class="step" style="background:var(--n-100)">100</div>
  <div class="step" style="background:var(--n-150)">150</div>
  <div class="step" style="background:var(--n-200)">200</div>
  <div class="step" style="background:var(--n-300)">300</div>
  <div class="step" style="background:var(--n-400);color:#fff">400</div>
  <div class="step" style="background:var(--n-500);color:#fff">500</div>
  <div class="step" style="background:var(--n-600);color:#fff">600</div>
  <div class="step" style="background:var(--n-700);color:#fff">700</div>
  <div class="step" style="background:var(--n-900);color:#fff">900</div>
</div>
</body></html>
