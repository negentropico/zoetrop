<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:24px;font-family:var(--font-display)}
  .big{font-size:64px;font-weight:var(--fw-medium);letter-spacing:var(--tracking-tighter);line-height:1;color:var(--ink)}
  .meta{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:10px}
  .glyphs{margin-top:14px;font-size:22px;color:var(--text-secondary);display:flex;gap:18px;font-weight:var(--fw-regular)}

<div class="meta">Space Grotesk · 400 / 500 / 700</div>
<div class="big">Every frame<br>of you.</div>

</body></html>
