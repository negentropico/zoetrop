<!-- @dsCard group="Type" viewport="700x290" name="Type scale" subtitle="11 → 88px, display family" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:22px;font-family:var(--font-display);color:var(--ink)}
  .row{display:flex;align-items:baseline;gap:16px;padding:3px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border:0}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:64px;flex:none;text-transform:uppercase}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-left:auto;flex:none}
  .s{font-weight:500;line-height:1.05;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body>
  <div class="row"><span class="tag">5xl</span><span class="s" style="font-size:42px">Move</span><span class="spec">88 / 700</span></div>
  <div class="row"><span class="tag">3xl</span><span class="s" style="font-size:34px">Resting heart</span><span class="spec">48 / 500</span></div>
  <div class="row"><span class="tag">2xl</span><span class="s" style="font-size:28px">Sleep last night</span><span class="spec">36 / 500</span></div>
  <div class="row"><span class="tag">xl</span><span class="s" style="font-size:22px">Weekly trends overview</span><span class="spec">28 / 500</span></div>
  <div class="row"><span class="tag">lg</span><span class="s" style="font-size:18px">Card title — recovery</span><span class="spec">22 / 500</span></div>
  <div class="row"><span class="tag">base</span><span class="s" style="font-family:var(--font-text);font-size:16px;font-weight:400">Body copy for descriptions and detail</span><span class="spec">16 / 400</span></div>
  <div class="row"><span class="tag">sm</span><span class="s" style="font-family:var(--font-text);font-size:14px;font-weight:400;color:var(--text-muted)">Secondary meta and helper text</span><span class="spec">14 / 400</span></div>
</body></html>
