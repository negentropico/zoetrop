<!-- @dsCard group="Colors" viewport="700x190" name="Metric families" subtitle="The five brand hues, mapped to wellness dimensions" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);padding:20px;font-family:var(--font-text)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:84px}
  .meta{padding:8px 10px;background:var(--surface)}
  .name{font-family:var(--font-display);font-weight:var(--fw-medium);font-size:var(--text-sm)}
  .hex{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
  .role{font-size:var(--text-2xs);color:var(--text-faint);margin-top:1px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--energy)"></div><div class="meta"><div class="name">Energy</div><div class="hex">#FFC53D</div><div class="role">Activity · move</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--vital)"></div><div class="meta"><div class="name">Vital</div><div class="hex">#11C29B</div><div class="role">Heart · recover</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--focus)"></div><div class="meta"><div class="name">Focus</div><div class="hex">#8070FF</div><div class="role">Mind · sleep</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--mist)"></div><div class="meta"><div class="name">Mist</div><div class="hex">#DCD1D5</div><div class="role">Neutral surface</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#272324</div><div class="role">Text · dark</div></div></div>
</div>
</body></html>
